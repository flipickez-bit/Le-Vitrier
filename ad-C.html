<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1080px;overflow:hidden;background:#060F20;font-family:'Outfit',sans-serif;}
.wrap{width:1080px;height:1080px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* Subtle radial glow */
.glow{
  position:absolute;
  width:700px;height:700px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(75,174,232,0.07) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}

/* Top logo */
.logo-wrap{
  position:absolute;top:52px;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 64px;
}
.logo-name{
  color:#fff;font-size:20px;font-weight:800;
  letter-spacing:5px;text-transform:uppercase;
}
.logo-accent{color:#4BAEE8;}
.available{
  color:rgba(255,255,255,0.35);font-size:13px;
  letter-spacing:1.5px;text-transform:uppercase;font-weight:400;
}

/* Main card */
.card{
  width:880px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  overflow:hidden;
  position:relative;
  z-index:5;
}

/* Photos inside card */
.card-photos{
  height:480px;display:flex;position:relative;
}
.card-half{width:50%;overflow:hidden;position:relative;}
.card-half img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
.card-half.left img{filter:brightness(0.65) saturate(0.45);}
.card-half.right img{filter:brightness(1.05) saturate(1.15);}

/* Inner labels */
.inner-label{
  position:absolute;bottom:20px;
  background:rgba(6,15,32,0.75);
  backdrop-filter:blur(10px);
  padding:6px 18px;border-radius:30px;
  font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  z-index:5;
}
.label-l{left:18px;color:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.1);}
.label-r{right:18px;color:#4BAEE8;border:1px solid rgba(75,174,232,0.3);}

/* Divider in card */
.card-vline{
  position:absolute;left:50%;top:0;bottom:0;
  width:2px;background:rgba(255,255,255,0.15);
  transform:translateX(-50%);z-index:10;
}

/* Card bottom */
.card-bottom{
  padding:36px 44px 38px;
  background:rgba(13,45,110,0.5);
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid rgba(255,255,255,0.07);
}
.cb-left{}
.cb-headline{
  color:#fff;font-size:28px;font-weight:800;
  line-height:1.15;letter-spacing:-0.3px;
}
.cb-headline span{color:#4BAEE8;}
.cb-meta{
  display:flex;align-items:center;gap:14px;margin-top:8px;
}
.stars{color:#FFD700;font-size:15px;}
.sep{width:1px;height:13px;background:rgba(255,255,255,0.15);}
.meta-t{color:rgba(255,255,255,0.4);font-size:13px;}
.cta{
  background:#4BAEE8;color:#0D2D6E;
  padding:16px 36px;border-radius:50px;
  font-size:16px;font-weight:800;
  white-space:nowrap;flex-shrink:0;
}

/* Bottom info */
.bottom-info{
  position:absolute;bottom:46px;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 64px;
}
.phone-wrap{display:flex;flex-direction:column;gap:3px;}
.phone-label{color:rgba(255,255,255,0.25);font-size:11px;letter-spacing:2px;text-transform:uppercase;}
.phone-num{color:rgba(255,255,255,0.75);font-size:18px;font-weight:600;}
.zones-wrap{
  color:rgba(255,255,255,0.2);font-size:12px;
  letter-spacing:2px;text-transform:uppercase;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="glow"></div>

  <!-- Logo bar -->
  <div class="logo-wrap">
    <div class="logo-name">Le <span class="logo-accent">Vitrier</span></div>
    <div class="available">Côte d'Azur</div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="card-photos">
      <div class="card-half left">
        <img src="avant pro.jpg" alt="Avant"/>
        <div class="inner-label label-l">Avant</div>
      </div>
      <div class="card-half right">
        <img src="apres pro.jpg" alt="Après"/>
        <div class="inner-label label-r">Après ✦</div>
      </div>
      <div class="card-vline"></div>
    </div>
    <div class="card-bottom">
      <div class="cb-left">
        <div class="cb-headline">Vitres impeccables,<br/><span>résultat garanti.</span></div>
        <div class="cb-meta">
          <span class="stars">★★★★★</span>
          <div class="sep"></div>
          <span class="meta-t">Devis gratuit · Intervention rapide</span>
        </div>
      </div>
      <div class="cta">Devis gratuit →</div>
    </div>
  </div>

  <!-- Bottom row -->
  <div class="bottom-info">
    <div class="phone-wrap">
      <div class="phone-label">Appelez-nous</div>
      <div class="phone-num">06 77 30 30 65</div>
    </div>
    <div class="zones-wrap">Nice · Cannes · Antibes · Monaco</div>
  </div>
</div>
</body>
</html>
