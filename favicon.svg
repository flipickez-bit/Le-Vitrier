<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fond bleu foncé -->
  <rect width="64" height="64" rx="10" fill="#0d2d5e"/>

  <!-- Raclette (manche) -->
  <rect x="30" y="36" width="4" height="14" rx="2" fill="#b0b8c8"/>

  <!-- Tête de raclette -->
  <rect x="18" y="31" width="28" height="7" rx="3" fill="#8a9ab5"/>

  <!-- Caoutchouc raclette -->
  <rect x="19" y="37" width="26" height="2" rx="1" fill="#5a6a85"/>

  <!-- Eau / savon (3 gouttes stylisées) -->
  <ellipse cx="24" cy="24" rx="4" ry="6" fill="#4a9fe8" opacity="0.9"/>
  <ellipse cx="32" cy="20" rx="5" ry="8" fill="#5cb8f5" opacity="0.95"/>
  <ellipse cx="40" cy="24" rx="4" ry="6" fill="#4a9fe8" opacity="0.9"/>

  <!-- Brillance sur l'eau -->
  <ellipse cx="31" cy="17" rx="2" ry="1" fill="white" opacity="0.6"/>

  <!-- Étoiles / brillance -->
  <text x="13" y="20" font-size="7" fill="white" opacity="0.9">✦</text>
  <text x="46" y="18" font-size="5" fill="white" opacity="0.8">✦</text>
</svg>
