<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Fond bleu marine, coins très arrondis -->
  <rect width="64" height="64" rx="16" fill="#0a2550"/>

  <!-- Reflet subtil haut -->
  <ellipse cx="32" cy="8" rx="22" ry="6" fill="white" opacity="0.04"/>

  <!-- === EAU / SAVON === -->
  <!-- Goutte gauche -->
  <ellipse cx="18" cy="27" rx="6" ry="9" fill="#2196F3" opacity="0.85"/>
  <!-- Goutte centrale (plus grande) -->
  <ellipse cx="32" cy="22" rx="8" ry="12" fill="#42A5F5"/>
  <!-- Goutte droite -->
  <ellipse cx="46" cy="27" rx="6" ry="9" fill="#2196F3" opacity="0.85"/>

  <!-- Reflets sur l'eau -->
  <ellipse cx="30" cy="17" rx="3" ry="2" fill="white" opacity="0.45"/>
  <ellipse cx="17" cy="23" rx="1.5" ry="1" fill="white" opacity="0.35"/>
  <ellipse cx="45" cy="23" rx="1.5" ry="1" fill="white" opacity="0.35"/>

  <!-- Bulles -->
  <circle cx="11" cy="16" r="2" fill="white" opacity="0.25"/>
  <circle cx="52" cy="20" r="1.5" fill="white" opacity="0.2"/>
  <circle cx="8"  cy="26" r="1" fill="white" opacity="0.15"/>
  <circle cx="56" cy="14" r="1" fill="white" opacity="0.15"/>

  <!-- === RACLETTE === -->
  <!-- Corps (arrondi) -->
  <rect x="9" y="35" width="46" height="8" rx="4" fill="#7B8FA8"/>
  <!-- Bande caoutchouc (arrondie) -->
  <rect x="11" y="41" width="42" height="3" rx="1.5" fill="#3C4F6A"/>
  <!-- Manche (arrondi) -->
  <rect x="27" y="43" width="10" height="14" rx="5" fill="#A0B0C8"/>
  <!-- Reflet manche -->
  <rect x="29" y="44" width="3" height="10" rx="1.5" fill="white" opacity="0.15"/>

</svg>
